name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [router-service, notification-service]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "**/${{ matrix.service }}/uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: "${{ matrix.service }}/.python-version"

    - name: Install dependencies
      working-directory: ./${{ matrix.service }}
      run: uv sync --dev

    - name: Lint with Ruff
      working-directory: ./${{ matrix.service }}
      run: uv run ruff check src tests

    - name: Run tests with Pytest
      working-directory: ./${{ matrix.service }}
      run: uv run pytest

  typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install router-service dependencies
      working-directory: ./router-service
      run: uv sync --dev

    - name: Install notification-service dependencies
      working-directory: ./notification-service
      run: uv sync --dev

    - name: Typecheck with Pyright
      run: uvx pyright .
